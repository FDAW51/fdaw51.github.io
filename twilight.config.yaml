# 站点配置
site:
    # 站点 URL（以斜杠结尾）
    siteURL: "https://quantum51.top/"
    # 站点标题
    title: "Eugene"
    # 站点副标题
    subtitle: "物理、AI 与个人成长的思考"
    # 语言配置
    lang: "zh-CN"
    # 翻译配置
    translate:
        # 启用翻译功能
        enable: false
    # 时区配置
    timeZone: 8
    # 字体配置
    font:
        "Zen Maru Gothic":
            src: "https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap"
            family: "Zen Maru Gothic"
    # 主题色配置
    themeColor:
        hue: 255
    # 默认主题 ("system" 跟随系统 | "light" 浅色 | "dark" 深色)
    defaultTheme: "dark"
    # 壁纸配置
    wallpaper:
        mode: "banner"
        src:
            desktop:
                - "/assets/images/desktopWallpaper_1.jpg"
                - "/assets/images/desktopWallpaper_2.jpg"
                - "/assets/images/desktopWallpaper_3.jpg"
            mobile:
                - "/assets/images/mobileWallpaper_1.jpg"
                - "/assets/images/mobileWallpaper_2.jpg"
        position: "center"
        carousel:
            enable: true
            interval: 3.6
            kenBurns: true
        banner:
            homeText:
                enable: true
                title: "Eugene"
                subtitle:
                    - "努力是为了以更好的状态去经历有意思的人和事"
                    - "未来已至，只是还未均匀"
                typewriter:
                    enable: true
                    speed: 111
                    deleteSpeed: 51
                    pauseTime: 3000
            credit:
                enable: false
            navbar:
                transparentMode: "semifull"
            waves:
                enable: true
                performanceMode: false
        fullscreen:
            zIndex: -1
            opacity: 0.9
            blur: 1
            navbar:
                transparentMode: "semi"
    # 加载页配置
    loadingOverlay:
        enable: false
        waitForAllResources: false
    # favicon 配置
    favicon: []
    # OpenGraph 配置
    generateOgImages: false

# Umami统计配置
umami:
    enabled: false

# 导航栏配置
navbar:
    # 链接配置 (链接预设位于 src/constants/link-presets.ts 的 LinkPresets)
    links:
        - # 一级导航链接 - 主页 (预设)
            "Home"
        - # 一级导航链接 - 归档 (预设)
            "Archive"
        - # 一级导航链接 - 知识图谱 (自定义)
            name: "知识图谱"
            url: "/graph/"
            icon: "mdi:graph"
        - # 一级导航链接 - 关于 (预设)
            "About"

# 侧边栏配置
sidebar:
    # 侧边栏组件配置列表 (侧栏组件预设位于 src/types/config.ts 的 WidgetComponentType)
    components:
        # 左侧侧边栏
        left:
            - # 组件 - 资料 (预设)
                type: "profile"
                enable: true
                position: "top"
            - # 组件 - 文章类别 (预设)
                type: "categories"
                enable: true
                position: "sticky"
                responsive:
                    collapseThreshold: 5
                depth: 3
            - # 组件 - 文章标签 (预设)
                type: "tags"
                enable: true
                position: "sticky"
                responsive:
                    collapseThreshold: 20
        # 右侧侧边栏
        right:
            - # 组件 - 文章目录 (预设)
                type: "toc"
                enable: true
                position: "sticky"
                depth: 3

# 资料配置
profile:
    # 头像配置 (相对于 /public 目录)
    avatar: "/img/averter.png"
    # 信息配置
    name: "俞小金 / Eugene"
    # 简介配置
    bio: "物理系研究生 | 量子计算 & AI | 努力是为了以更好的状态去经历有意思的人和事"
    # 链接配置
    links:
        - # 链接 - GitHub
            name: "GitHub"
            icon: "fa6-brands:github"
            url: "https://github.com/FDAW51"

# 公告配置
announcement:
    enable: false
    content: ""

# 文章配置
post:
    # 显示”上次编辑”卡片
    showLastModified: true
    # 代码高亮配置
    expressiveCode:
        # 主题
        theme: “github-dark”
    # 许可证配置
    license:
        # 启用许可证
        enable: true
        # 许可证名称
        name: “CC BY-NC-SA 4.0”
        # 许可证链接
        url: “https://creativecommons.org/licenses/by-nc-sa/4.0/”
    # 评论配置
    comment:
        # 启用评论功能
        enable: true
        # Waline 评论系统配置
        waline:
            # 服务器 URL
            serverURL: “https://waline1-eight.vercel.app/”
            # 语言
            lang: “zh-CN”

# 页脚配置
footer:
    # 启用 Footer HTML 注入功能
    enable: true
    # 自定义 HTML 内容
    customHtml: "© 2025-2026 Eugene. Licensed under CC BY-NC-SA 4.0."

# 粒子特效配置
particle:
    enable: false

# 音乐播放器配置
musicPlayer:
    # 启用音乐播放器
    enable: true
    # 模式: "local"（本地文件）或 "meting"（在线 API）
    mode: "local"
    # 本地模式配置
    local:
        # 播放列表（音频文件放在 public/music/ 目录下）
        playlist:
            - id: 1
              title: "24-7, 365"
              artist: "elijah woods"
              cover: "/img/averter.png"
              url: "/music/01-247-365.m4a"
              duration: 0
            - id: 2
              title: "Call of Silence"
              artist: "澤野弘之 / R!N / Gemie"
              cover: "/img/averter.png"
              url: "/music/02-call-of-silence.m4a"
              duration: 0
            - id: 3
              title: "Panorama"
              artist: "X-Ray Dog"
              cover: "/img/averter.png"
              url: "/music/03-panorama.m4a"
              duration: 0
            - id: 4
              title: "Time to go home"
              artist: "Jacoo"
              cover: "/img/averter.png"
              url: "/music/04-time-to-go-home.m4a"
              duration: 0
            - id: 5
              title: "Towards the Light"
              artist: "Jacoo"
              cover: "/img/averter.png"
              url: "/music/05-towards-the-light.m4a"
              duration: 0
            - id: 6
              title: "时空观影券"
              artist: "Tiko / 缪礼丞 / 粉太狼（夏利）"
              cover: "/img/averter.png"
              url: "/music/06-shi-kong-guan-ying-quan.m4a"
              duration: 0
    # meting 模式配置（从在线平台获取歌单）
    meting:
        meting_api: "https://api.i-meto.com/meting/api"
        server: "netease"
        type: "playlist"
        id: "2161912966"
    # 是否自动播放（浏览器可能阻止自动播放）
    autoplay: false

# 看板娘配置
pio:
    enable: false